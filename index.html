<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICP Explorer — An 8-Bit Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0E031F;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  #game-wrapper { position: relative; image-rendering: pixelated; }
  canvas { display: block; image-rendering: pixelated; border: 3px solid #522785; border-radius: 4px; }
  #hud {
    position: absolute; top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .hud-item { background: rgba(14,3,31,0.85); padding: 6px 12px; border-radius: 4px; font-size: 14px; border: 1px solid #522785; }
  #quest-count { color: #29ABE2; }
  #cycles { color: #DDF730; }
  #fragments-hud { color: #b055e2; }
  #dialogue-box {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    background: rgba(14,3,31,0.95); border: 2px solid #29ABE2; border-radius: 6px;
    padding: 16px 20px; color: #fff; font-size: 15px; line-height: 1.5;
    display: none; z-index: 20;
  }
  #dialogue-box .speaker { color: #DDF730; font-weight: bold; margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  #dialogue-box .text { color: #e0e0e0; }
  #dialogue-box .prompt { color: #29ABE2; font-size: 12px; margin-top: 8px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #quest-log {
    position: absolute; top: 40px; right: 8px; background: rgba(14,3,31,0.9);
    border: 1px solid #522785; border-radius: 6px; padding: 12px 16px;
    color: #e0e0e0; font-size: 12px; line-height: 1.6; max-width: 300px;
    display: none; z-index: 15; pointer-events: none;
  }
  #quest-log h3 { color: #DDF730; margin-bottom: 6px; font-size: 13px; }
  #quest-log .section { color: #29ABE2; margin-top: 8px; margin-bottom: 4px; font-size: 11px; }
  #quest-log .quest { margin-bottom: 4px; }
  #quest-log .quest.done { color: #29ABE2; text-decoration: line-through; opacity: 0.6; }
  #title-screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center; background: #0E031F; z-index: 100;
  }
  #title-screen h1 { font-size: 36px; color: #29ABE2; text-shadow: 3px 3px 0 #522785; margin-bottom: 8px; letter-spacing: 2px; }
  #title-screen h2 { font-size: 16px; color: #DDF730; margin-bottom: 40px; font-weight: normal; }
  #title-screen .start-prompt { color: #fff; font-size: 18px; animation: blink 1.2s infinite; }
  #minimap {
    position: absolute; top: 40px; left: 8px; background: rgba(14,3,31,0.9);
    border: 1px solid #522785; border-radius: 4px; padding: 4px; z-index: 15; pointer-events: none;
  }
  #completion-screen {
    position: absolute; inset: 0; display: none; flex-direction: column;
    justify-content: center; align-items: center; background: rgba(14,3,31,0.97);
    z-index: 100; text-align: center;
  }
  #completion-screen h1 { font-size: 28px; color: #DDF730; margin-bottom: 12px; }
  #completion-screen p { color: #e0e0e0; font-size: 15px; line-height: 1.6; max-width: 500px; margin-bottom: 8px; }
  #completion-screen .stat { color: #29ABE2; font-size: 14px; margin-bottom: 4px; }
  #minigame-overlay { position: absolute; inset: 0; display: none; z-index: 50; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
  <canvas id="minigame-overlay" width="800" height="600"></canvas>
  <div id="hud">
    <div class="hud-item" id="quest-count">Quests: 0/9</div>
    <div class="hud-item" id="fragments-hud" style="display:none">Fragments: 0/4</div>
    <div class="hud-item" id="cycles">Cycles: 0</div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>
  <div id="quest-log"></div>
  <div id="dialogue-box">
    <div class="speaker"></div>
    <div class="text"></div>
    <div class="prompt">▼ SPACE to continue</div>
  </div>
  <div id="title-screen">
    <h1>ICP EXPLORER</h1>
    <h2>An 8-Bit Adventure Through the Internet Computer</h2>
    <div class="start-prompt">— Press SPACE or ENTER to start —</div>
  </div>
  <div id="completion-screen">
    <h1>QUEST COMPLETE</h1>
    <p id="completion-text"></p>
    <div class="stat" id="completion-stats"></div>
  </div>
</div>

<script>
// ============================================================
// ICP EXPLORER — 8-Bit Educational Adventure
// Expanded map: central hub + 4 side rooms (N/E/S/W)
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mgCanvas = document.getElementById('minigame-overlay');
const mgCtx = mgCanvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

const TILE = 32;
// Map is now 60 wide x 60 tall to accommodate side rooms
const COLS = 80;
const ROWS = 64;
const VIEW_COLS = 25;
const VIEW_ROWS = 18;
const PLAYER_SPEED = 2.5;

const C = {
  bg:'#0E031F', purple:'#522785', cyan:'#29ABE2', lime:'#DDF730',
  dark:'#1a0a2e', keyCap:'#4a3070', keyEdge:'#1a0a2e', keyLight:'#3a2060',
  path:'#2a1a40', water:'#0a1a3e',
  npcRed:'#e25555', npcGreen:'#55e280', npcBlue:'#5580e2', npcYellow:'#e2d055', npcPink:'#e255b0',
  red:'#e25555', orange:'#e28055',
  // Room-specific
  vaultFloor:'#0a2a3a', vaultWall:'#0a1520', vaultAccent:'#1a5a7a',
  ddosFloor:'#1a0a2e', ddosAccent:'#29ABE2',
  burnFloor:'#2e1a0a', burnAccent:'#e28055',
  assemblyFloor:'#1a0a2e', assemblyAccent:'#b055e2',
};

// ============================================================
// STATE
// ============================================================
const state = {
  screen: 'title',
  player: { x: 30*TILE, y: 30*TILE, dir: 'down' },
  camera: { x: 0, y: 0 },
  keys: {},
  cycles: 0,
  questsCompleted: 0,
  totalQuests: 9,
  dialogueQueue: [], dialogueIndex: 0, currentNPC: null,
  _afterDialogue: null,
  quests: {
    internet_computer: { done:false, name:'The World Computer' },
    caffeine: { done:false, name:'Chat. Build. Own.' },
    self_writing: { done:false, name:'Self-Writing Cloud' },
    cloud_engines: { done:false, name:'Cloud Engines' },
    mission70: { done:false, name:'Mission 70' },
    canister_assembly: { done:false, name:'Canister Assembly' },
    swiss_vault: { done:false, name:'Swiss Vault' },
    cycle_burn: { done:false, name:'Cycle Burn Challenge' },
    ddos_defense: { done:false, name:'DDoS Defense' },
  },
  particles: [], floatingTexts: [], time: 0,
  // Canister Assembly
  fragments: { collected:0, pieces:[false,false,false,false] },
  assemblyOrder: [], assemblyCursor: 0,
  // DDoS
  ddosPackets:[], ddosScore:0, ddosMissed:0, ddosBlocked:0, ddosTimer:0, ddosDuration:20, ddosSpawnTimer:0, ddosLaneCooldown:[0,0,0,0],
  // Burn
  burnCanisters:[], burnBudget:0, burnAllocated:[], burnCursor:0,
  // Vault
  vaultPlayer:{x:0,y:0}, vaultReached:false,
};

// ============================================================
// WORLD MAP GENERATION
// ============================================================
const world = [];
for (let y = 0; y < ROWS; y++) {
  world[y] = [];
  for (let x = 0; x < COLS; x++) world[y][x] = 0; // void by default
}

// --- CENTRAL HUB: 40x30 block at center ---
const HUB = { x: 20, y: 17, w: 40, h: 30 };
for (let y = HUB.y; y < HUB.y+HUB.h; y++) {
  for (let x = HUB.x; x < HUB.x+HUB.w; x++) {
    if (x === HUB.x || x === HUB.x+HUB.w-1 || y === HUB.y || y === HUB.y+HUB.h-1) world[y][x] = 3; // wall
    else world[y][x] = 1; // keyboard floor
  }
}

// --- ZONES inside hub ---
const zones = [
  { id:'internet_computer', name:'INTERNET COMPUTER', color:C.cyan, cx:HUB.x+8, cy:HUB.y+6, radius:4 },
  { id:'caffeine', name:'CAFFEINE', color:C.lime, cx:HUB.x+32, cy:HUB.y+6, radius:4 },
  { id:'self_writing', name:'SELF-WRITING CLOUD', color:'#b055e2', cx:HUB.x+8, cy:HUB.y+24, radius:4 },
  { id:'cloud_engines', name:'CLOUD ENGINES', color:'#e28055', cx:HUB.x+32, cy:HUB.y+24, radius:4 },
  { id:'mission70', name:'MISSION 70', color:'#e25555', cx:HUB.x+20, cy:HUB.y+15, radius:5 },
];

zones.forEach(z => {
  for (let dy = -z.radius; dy <= z.radius; dy++) {
    for (let dx = -z.radius; dx <= z.radius; dx++) {
      const tx = z.cx+dx, ty = z.cy+dy;
      if (tx > HUB.x && tx < HUB.x+HUB.w-1 && ty > HUB.y && ty < HUB.y+HUB.h-1)
        world[ty][tx] = (Math.abs(dx)===z.radius||Math.abs(dy)===z.radius) ? 6 : 5;
    }
  }
});

function carvePath(x1,y1,x2,y2) {
  let cx=x1,cy=y1;
  while(cx!==x2){world[cy][cx]=2;if(cy>0&&world[cy-1][cx]===1)world[cy-1][cx]=2;cx+=cx<x2?1:-1;}
  while(cy!==y2){world[cy][cx]=2;if(cx>0&&world[cy][cx-1]===1)world[cy][cx-1]=2;cy+=cy<y2?1:-1;}
}

// Hub internal paths
const zc = zones.map(z=>({x:z.cx,y:z.cy}));
carvePath(zc[0].x+4,zc[0].y,zc[1].x-4,zc[1].y); // IC -> Caffeine
carvePath(zc[0].x,zc[0].y+4,zc[0].x,zc[2].y-4);   // IC -> Self-Writing
carvePath(zc[1].x,zc[1].y+4,zc[1].x,zc[3].y-4);   // Caffeine -> Cloud Engines
carvePath(zc[2].x+4,zc[2].y,zc[3].x-4,zc[3].y);   // Self-Writing -> Cloud Engines
carvePath(zc[0].x+4,zc[0].y,zc[4].x,zc[4].y);     // IC -> Mission 70
carvePath(zc[1].x-4,zc[1].y,zc[4].x,zc[4].y);     // Caffeine -> Mission 70

// Water features in hub
for(let i=HUB.x+15;i<HUB.x+25;i++){world[HUB.y+2][i]=4;world[HUB.y+3][i]=4;}
for(let i=HUB.x+15;i<HUB.x+25;i++){world[HUB.y+HUB.h-3][i]=4;world[HUB.y+HUB.h-4][i]=4;}

// --- SIDE ROOMS ---
// Each room is 16x12, connected via a corridor

// WEST ROOM (Canister Assembly) — left of hub
const WEST = { x: HUB.x-18, y: HUB.y+9, w: 16, h: 12 };
for(let y=WEST.y;y<WEST.y+WEST.h;y++){
  for(let x=WEST.x;x<WEST.x+WEST.w;x++){
    if(x===WEST.x||x===WEST.x+WEST.w-1||y===WEST.y||y===WEST.y+WEST.h-1)world[y][x]=3;
    else world[y][x]=8; // assembly floor (tile type 8)
  }
}
// Corridor west — open both the room's east wall AND the hub's west wall
for(let x=WEST.x+WEST.w-1;x<=HUB.x;x++){world[WEST.y+5][x]=2;world[WEST.y+6][x]=2;}
// Punch through room's east wall
world[WEST.y+5][WEST.x+WEST.w-1]=8;world[WEST.y+6][WEST.x+WEST.w-1]=8;
// Punch through hub's west wall
world[WEST.y+5][HUB.x]=2;world[WEST.y+6][HUB.x]=2;

// EAST ROOM (DDoS Defense) — right of hub
const EAST = { x: HUB.x+HUB.w+2, y: HUB.y+9, w: 16, h: 12 };
for(let y=EAST.y;y<EAST.y+EAST.h;y++){
  for(let x=EAST.x;x<EAST.x+EAST.w;x++){
    if(x===EAST.x||x===EAST.x+EAST.w-1||y===EAST.y||y===EAST.y+EAST.h-1)world[y][x]=3;
    else world[y][x]=9; // ddos floor (tile type 9)
  }
}
// Corridor east — open both hub's east wall AND the room's west wall
for(let x=HUB.x+HUB.w-1;x<=EAST.x;x++){world[EAST.y+5][x]=2;world[EAST.y+6][x]=2;}
// Punch through hub's east wall
world[EAST.y+5][HUB.x+HUB.w-1]=2;world[EAST.y+6][HUB.x+HUB.w-1]=2;
// Punch through room's west wall
world[EAST.y+5][EAST.x]=9;world[EAST.y+6][EAST.x]=9;

// SOUTH ROOM (Cycle Burn) — below hub
const SOUTH = { x: HUB.x+12, y: HUB.y+HUB.h+2, w: 16, h: 12 };
for(let y=SOUTH.y;y<SOUTH.y+SOUTH.h;y++){
  for(let x=SOUTH.x;x<SOUTH.x+SOUTH.w;x++){
    if(x===SOUTH.x||x===SOUTH.x+SOUTH.w-1||y===SOUTH.y||y===SOUTH.y+SOUTH.h-1)world[y][x]=3;
    else world[y][x]=10; // burn floor (tile type 10)
  }
}
// Corridor south — open both hub's south wall AND the room's north wall
for(let y=HUB.y+HUB.h-1;y<=SOUTH.y;y++){world[y][SOUTH.x+7]=2;world[y][SOUTH.x+8]=2;}
// Punch through hub's south wall
world[HUB.y+HUB.h-1][SOUTH.x+7]=2;world[HUB.y+HUB.h-1][SOUTH.x+8]=2;
// Punch through room's north wall
world[SOUTH.y][SOUTH.x+7]=10;world[SOUTH.y][SOUTH.x+8]=10;

// NORTH (Swiss Vault) — hidden above hub, secret entrance in water
const NORTH = { x: HUB.x+12, y: HUB.y-14, w: 16, h: 12 };
for(let y=NORTH.y;y<NORTH.y+NORTH.h;y++){
  for(let x=NORTH.x;x<NORTH.x+NORTH.w;x++){
    if(x===NORTH.x||x===NORTH.x+NORTH.w-1||y===NORTH.y||y===NORTH.y+NORTH.h-1)world[y][x]=3;
    else world[y][x]=11; // vault floor (tile type 11)
  }
}
// Internal vault maze walls
const vaultMaze = [
  // Horizontal
  [NORTH.x+3,NORTH.y+3,NORTH.x+7,NORTH.y+3],
  [NORTH.x+9,NORTH.y+3,NORTH.x+13,NORTH.y+3],
  [NORTH.x+2,NORTH.y+6,NORTH.x+6,NORTH.y+6],
  [NORTH.x+8,NORTH.y+6,NORTH.x+13,NORTH.y+6],
  [NORTH.x+4,NORTH.y+9,NORTH.x+11,NORTH.y+9],
  // Vertical
  [NORTH.x+7,NORTH.y+3,NORTH.x+7,NORTH.y+6],
  [NORTH.x+13,NORTH.y+1,NORTH.x+13,NORTH.y+4],
  [NORTH.x+2,NORTH.y+6,NORTH.x+2,NORTH.y+9],
  [NORTH.x+11,NORTH.y+6,NORTH.x+11,NORTH.y+9],
  // Single block closing the right-side gap
  [NORTH.x+14,NORTH.y+6,NORTH.x+14,NORTH.y+6],
];
vaultMaze.forEach(([x1,y1,x2,y2])=>{
  if(y1===y2)for(let x=x1;x<=x2;x++)world[y1][x]=3;
  else for(let y=y1;y<=y2;y++)world[y][x1]=3;
});
// Vault core
world[NORTH.y+1][NORTH.x+NORTH.w-2] = 12; // CORE tile type

// Secret passage to vault — looks like solid wall but is walkable
// Tile 14 = fake wall (renders as wall, but passable)
// Tile 15 = fake wall with Swiss cross clue (subtle etching)
const secretX = HUB.x+20;
// The hub's north wall at this point becomes fake walls
world[HUB.y][secretX] = 14;   // fake wall (hub border)
world[HUB.y][secretX+1] = 15; // fake wall with cross clue
// Hidden corridor up to vault — all fake walls
for(let y=NORTH.y+NORTH.h-1;y<HUB.y;y++){world[y][secretX]=14;world[y][secretX+1]=14;}
// Open the vault's south wall to connect
world[NORTH.y+NORTH.h-1][secretX]=11;world[NORTH.y+NORTH.h-1][secretX+1]=11;

// Room labels (decorative markers — tile type 13)
// We'll use zone data for room identification instead

function getZoneAt(tx,ty) {
  for(const z of zones) if(Math.abs(tx-z.cx)<=z.radius&&Math.abs(ty-z.cy)<=z.radius) return z;
  return null;
}

function getRoomAt(tx,ty) {
  if(tx>=WEST.x&&tx<WEST.x+WEST.w&&ty>=WEST.y&&ty<WEST.y+WEST.h) return {name:'ASSEMBLY LAB',color:C.assemblyAccent};
  if(tx>=EAST.x&&tx<EAST.x+EAST.w&&ty>=EAST.y&&ty<EAST.y+EAST.h) return {name:'BOUNDARY NODE',color:C.ddosAccent};
  if(tx>=SOUTH.x&&tx<SOUTH.x+SOUTH.w&&ty>=SOUTH.y&&ty<SOUTH.y+SOUTH.h) return {name:'CYCLE TREASURY',color:C.burnAccent};
  if(tx>=NORTH.x&&tx<NORTH.x+NORTH.w&&ty>=NORTH.y&&ty<NORTH.y+NORTH.h) return {name:'SWISS VAULT',color:C.vaultAccent};
  return null;
}

// ============================================================
// NPCs
// ============================================================
const npcs = [
  // Main quest NPCs (inside hub zones)
  { id:'ic_guide', x:zones[0].cx*TILE, y:zones[0].cy*TILE, color:C.npcBlue, quest:'internet_computer', name:'DOMINIC',
    dialogues:[
      {speaker:'DOMINIC',text:"Welcome, explorer. I'm the architect of the Internet Computer — the world's first truly decentralised cloud."},
      {speaker:'DOMINIC',text:"The Internet Computer runs on a network of sovereign nodes across independent data centres worldwide. No single entity controls it."},
      {speaker:'DOMINIC',text:"Smart contracts here are called 'canisters' — they hold both code AND data, and they run at web speed. No cloud provider needed."},
      {speaker:'DOMINIC',text:"The IC processes over 500 million transactions daily, with block finality in under 2 seconds. Try getting that from AWS."},
      {speaker:'DOMINIC',text:"The key insight: software should own itself. Applications on the IC are governed by DAOs, not corporations. That's real sovereignty."},
      {speaker:'QUEST',text:"QUEST COMPLETE: The World Computer — You've learned what makes the Internet Computer fundamentally different from traditional cloud."},
    ]},
  { id:'caffeine_guide', x:zones[1].cx*TILE, y:zones[1].cy*TILE, color:C.npcGreen, quest:'caffeine', name:'BARISTA',
    dialogues:[
      {speaker:'BARISTA',text:"Hey! Welcome to the Caffeine zone. I build apps here by just... talking to them."},
      {speaker:'BARISTA',text:"Caffeine is the world's first self-writing apps platform. Chat. Build. Own. That's the whole idea."},
      {speaker:'BARISTA',text:"You describe what you want in plain English, and Caffeine writes the code, deploys the canister, and gives you a live app. In minutes."},
      {speaker:'BARISTA',text:"Every app you build, you own. It deploys to the Internet Computer as a canister — no server bills, no vendor lock-in."},
      {speaker:'BARISTA',text:"V3 just launched with multi-page apps, a visual composer, and an app marketplace. People are building real products here."},
      {speaker:'QUEST',text:"QUEST COMPLETE: Chat. Build. Own. — You've discovered how Caffeine makes the Internet Computer accessible to everyone."},
    ]},
  { id:'sw_guide', x:zones[2].cx*TILE, y:zones[2].cy*TILE, color:C.npcPink, quest:'self_writing', name:'ORACLE',
    dialogues:[
      {speaker:'ORACLE',text:"You've reached the frontier. Self-Writing Cloud is what happens when AI meets decentralised infrastructure."},
      {speaker:'ORACLE',text:"Imagine software that writes, tests, deploys, and maintains itself — all on tamperproof infrastructure. That's Self-Writing Cloud."},
      {speaker:'ORACLE',text:"AI agents running inside canisters can autonomously create and manage other canisters. Software that creates more software."},
      {speaker:'ORACLE',text:"The key difference from traditional AI-generated code: these apps run on sovereign infrastructure. No Big Tech middleman."},
      {speaker:'ORACLE',text:"Caffeine is the first proof point. But Self-Writing Cloud is the paradigm — every industry will be reshaped by autonomous software."},
      {speaker:'QUEST',text:"QUEST COMPLETE: Self-Writing Cloud — You've glimpsed the future where software builds and governs itself."},
    ]},
  { id:'ce_guide', x:zones[3].cx*TILE, y:zones[3].cy*TILE, color:C.npcYellow, quest:'cloud_engines', name:'ENGINEER',
    dialogues:[
      {speaker:'ENGINEER',text:"Cloud Engines are the beating heart of the Internet Computer. Let me show you how this machine actually works."},
      {speaker:'ENGINEER',text:"A Cloud Engine is a standardised compute unit — node machines running the IC protocol in independent data centres."},
      {speaker:'ENGINEER',text:"They're grouped into subnets. Each subnet is a mini-blockchain that runs canisters. More subnets = more capacity. It scales horizontally."},
      {speaker:'ENGINEER',text:"Node providers earn ICP tokens for running Cloud Engines. It's decentralised infrastructure with real economic incentives."},
      {speaker:'ENGINEER',text:"The Swiss subnet, the European sovereign cloud, AI-specific subnets — each is purpose-built. This isn't one-size-fits-all cloud."},
      {speaker:'QUEST',text:"QUEST COMPLETE: Cloud Engines — You now understand the physical infrastructure powering the World Computer."},
    ]},
  { id:'m70_guide', x:zones[4].cx*TILE, y:zones[4].cy*TILE, color:C.npcRed, quest:'mission70', name:'ECONOMIST',
    dialogues:[
      {speaker:'ECONOMIST',text:"Mission 70 is the most ambitious tokenomics initiative in crypto. And it's working."},
      {speaker:'ECONOMIST',text:"The goal: reduce ICP inflation from 9.72% to roughly 2.92% — a 70% reduction. Hence the name."},
      {speaker:'ECONOMIST',text:"It works through cycle burn mechanics. When people use canisters, they burn cycles. More usage = more ICP burned = lower inflation."},
      {speaker:'ECONOMIST',text:"As adoption grows, the network becomes deflationary. Not through artificial scarcity, but through genuine utility."},
      {speaker:'ECONOMIST',text:"This aligns everyone's incentives: builders create useful apps, users consume cycles, and the token economics improve for all holders."},
      {speaker:'QUEST',text:"QUEST COMPLETE: Mission 70 — You understand how utility-driven deflation creates a sustainable token economy."},
    ]},

  // WEST ROOM — Canister Assembly
  { id:'assembler', x:(WEST.x+8)*TILE, y:(WEST.y+6)*TILE, color:'#b0b0b0', quest:'canister_assembly', name:'DEPLOYER',
    isSideQuest:'canister_assembly',
    dialogues:[
      {speaker:'DEPLOYER',text:"Welcome to the Assembly Lab. I can help you deploy a canister, but I need 4 code fragments first."},
      {speaker:'DEPLOYER',text:"They're scattered in the four corners of the main hub — glowing purple shards. Find: MODULE, STABLE, PUBLIC, and SYSTEM."},

function initDDoS(){
  state.ddosPackets=[];state.ddosScore=0;state.ddosMissed=0;state.ddosBlocked=0;
  state.ddosTimer=state.ddosDuration;state.ddosSpawnTimer=0;state.ddosLaneCooldown=[0,0,0,0];
  state.screen='minigame_ddos';mgCanvas.style.display='block';
}
function updateDDoS(dt){
  state.ddosTimer-=dt;state.ddosSpawnTimer-=dt;
  for(let i=0;i<4;i++)state.ddosLaneCooldown[i]=Math.max(0,state.ddosLaneCooldown[i]-dt);
  if(state.ddosTimer<=0){finishDDoS();return;}
  if(state.ddosSpawnTimer<=0){
    const lane=Math.floor(Math.random()*4);
    state.ddosPackets.push({lane,x:800,speed:150+Math.random()*100+(state.ddosDuration-state.ddosTimer)*5,isAttack:Math.random()<0.45,blocked:false,passed:false});
    state.ddosSpawnTimer=0.4+Math.random()*0.3-(state.ddosDuration-state.ddosTimer)*0.01;
  }
  state.ddosPackets.forEach(p=>{if(!p.blocked&&!p.passed){p.x-=p.speed*dt;if(p.x<60){p.passed=true;if(p.isAttack)state.ddosMissed++;else state.ddosScore+=10;}}});
  state.ddosPackets=state.ddosPackets.filter(p=>!p.passed&&(!p.blocked||p.blockAnim>0));
  state.ddosPackets.forEach(p=>{if(p.blocked)p.blockAnim=(p.blockAnim||0.5)-dt;});
}
function blockLane(lane){
  if(state.ddosLaneCooldown[lane]>0)return;state.ddosLaneCooldown[lane]=0.3;
  let closest=null,cd=Infinity;
  state.ddosPackets.forEach(p=>{if(p.lane===lane&&!p.blocked&&!p.passed&&p.x<200&&p.x>40&&p.x<cd){cd=p.x;closest=p;}});
  if(closest){closest.blocked=true;closest.blockAnim=0.5;if(closest.isAttack){state.ddosBlocked++;state.ddosScore+=20;}else state.ddosScore-=15;}
}
function renderDDoS(){
  mgCtx.clearRect(0,0,800,600);mgCtx.fillStyle='rgba(14,3,31,0.95)';mgCtx.fillRect(0,0,800,600);
  mgCtx.fillStyle=C.cyan;mgCtx.font='bold 18px monospace';mgCtx.textAlign='center';mgCtx.fillText('DDoS DEFENSE — BOUNDARY NODE',400,40);
  mgCtx.fillStyle=state.ddosTimer<5?C.red:C.lime;mgCtx.font='14px monospace';
  mgCtx.fillText(`Time: ${Math.ceil(state.ddosTimer)}s | Score: ${state.ddosScore} | Blocked: ${state.ddosBlocked} | Leaked: ${state.ddosMissed}`,400,65);
  const lH=100,sY=100;
  for(let i=0;i<4;i++){const ly=sY+i*lH;mgCtx.fillStyle=i%2?'rgba(26,10,46,0.5)':'rgba(42,26,64,0.5)';mgCtx.fillRect(60,ly,740,lH-10);mgCtx.fillStyle='#8a7aa0';mgCtx.font='12px monospace';mgCtx.textAlign='center';mgCtx.fillText(`[${i+1}]`,30,ly+lH/2);if(state.ddosLaneCooldown[i]>0){mgCtx.fillStyle='rgba(41,171,226,0.3)';mgCtx.fillRect(60,ly,140,lH-10);}mgCtx.strokeStyle='#3a2060';mgCtx.lineWidth=1;mgCtx.beginPath();mgCtx.moveTo(60,ly+lH-10);mgCtx.lineTo(800,ly+lH-10);mgCtx.stroke();}
  mgCtx.strokeStyle=C.cyan;mgCtx.lineWidth=2;mgCtx.setLineDash([5,5]);mgCtx.beginPath();mgCtx.moveTo(60,sY);mgCtx.lineTo(60,sY+4*lH);mgCtx.stroke();mgCtx.setLineDash([]);
  state.ddosPackets.forEach(p=>{if(p.blocked){mgCtx.globalAlpha=p.blockAnim||0;mgCtx.fillStyle='#fff';mgCtx.font='bold 16px monospace';mgCtx.textAlign='center';mgCtx.fillText('✕',p.x,sY+p.lane*lH+lH/2);mgCtx.globalAlpha=1;return;}if(p.passed)return;const py=sY+p.lane*lH+(lH-10)/2;if(p.isAttack){mgCtx.fillStyle=C.red;mgCtx.fillRect(p.x-12,py-12,24,24);mgCtx.fillStyle='#fff';mgCtx.font='bold 14px monospace';mgCtx.textAlign='center';mgCtx.fillText('☠',p.x,py+5);}else{mgCtx.fillStyle='#55e280';mgCtx.fillRect(p.x-12,py-12,24,24);mgCtx.fillStyle='#fff';mgCtx.font='bold 12px monospace';mgCtx.textAlign='center';mgCtx.fillText('GET',p.x,py+4);}});
  mgCtx.fillStyle='rgba(14,3,31,0.8)';mgCtx.fillRect(200,560,400,30);mgCtx.fillStyle='#8a7aa0';mgCtx.font='12px monospace';mgCtx.textAlign='center';mgCtx.fillText('Keys 1-4 block red packets. Let green through!',400,580);
}
function finishDDoS(){
  mgCanvas.style.display='none';state.screen='playing';
  if(state.ddosMissed<5&&state.ddosBlocked>3&&!state.quests.ddos_defense.done){
    state.quests.ddos_defense.done=true;state.questsCompleted++;state.cycles+=80;updateHUD();
    spawnBurst(state.player.x+16,state.player.y+16);
    showSideDialogue(npcs.find(n=>n.id==='boundary'),'dialoguesDone');
    if(state.questsCompleted>=state.totalQuests)setTimeout(showCompletion,500);
  }else if(state.ddosMissed>=5||state.ddosBlocked<=3){
    state.dialogueQueue=[{speaker:'FIREWALL',text:`Defence failed — ${state.ddosMissed} attacks leaked through. Need fewer than 5 leaks and more than 3 blocks. Try again!`}];
    state.dialogueIndex=0;state.screen='dialogue';showDialogue();
  }
}

function submitBurn(){

    if(!funded&&c.utility>=8)score-=15;if(!funded&&c.utility<3)score+=10;
  });

    state.quests.cycle_burn.done=true;state.questsCompleted++;state.cycles+=80;updateHUD();

function isWalkable(x,y){
  const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return false;
  const t=world[ty][tx];return t!==0&&t!==3&&t!==4; // void, wall, water block (14,15 = fake walls, passable)
}

function updatePlayer(){
  if(state.screen!=='playing')return;
  const k=state.keys;let dx=0,dy=0;
  if(k.ArrowUp||k.w||k.W){dy=-PLAYER_SPEED;state.player.dir='up';}
  if(k.ArrowDown||k.s||k.S){dy=PLAYER_SPEED;state.player.dir='down';}
  if(k.ArrowLeft||k.a||k.A){dx=-PLAYER_SPEED;state.player.dir='left';}
  if(k.ArrowRight||k.d||k.D){dx=PLAYER_SPEED;state.player.dir='right';}
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  const hx=10,hy=14,hw=12,hh=16;
  if(dx){const nx=state.player.x+dx;if(isWalkable(nx+hx,state.player.y+hy)&&isWalkable(nx+hx+hw,state.player.y+hy)&&isWalkable(nx+hx,state.player.y+hy+hh)&&isWalkable(nx+hx+hw,state.player.y+hy+hh))state.player.x=nx;}
  if(dy){const ny=state.player.y+dy;if(isWalkable(state.player.x+hx,ny+hy)&&isWalkable(state.player.x+hx+hw,ny+hy)&&isWalkable(state.player.x+hx,ny+hy+hh)&&isWalkable(state.player.x+hx+hw,ny+hy+hh))state.player.y=ny;}

  // Pickups
  pickups.forEach(p=>{if(p.collected)return;if(Math.hypot((state.player.x+16)-p.x,(state.player.y+16)-p.y)<24){p.collected=true;state.cycles+=10;for(let i=0;i<8;i++)state.particles.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:1,size:3,color:C.lime});state.floatingTexts.push({x:p.x,y:p.y,text:'+10 CYCLES',color:C.lime,life:1});updateHUD();}});

  // Fragments
  codeFragments.forEach(f=>{if(f.collected)return;if(Math.hypot((state.player.x+16)-(f.x+16),(state.player.y+16)-(f.y+16))<30){f.collected=true;state.fragments.pieces[f.id]=true;state.fragments.collected++;for(let i=0;i<12;i++)state.particles.push({x:f.x+16,y:f.y+16,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,size:4,color:fragmentColors[f.id]});state.floatingTexts.push({x:f.x+16,y:f.y+16,text:`${f.name} FRAGMENT`,color:'#b055e2',life:1.5});updateHUD();}});

  // Vault core check
  const ptx=Math.floor((state.player.x+16)/TILE),pty=Math.floor((state.player.y+16)/TILE);
  if(world[pty]&&world[pty][ptx]===12&&!state.quests.swiss_vault.done){
    state.quests.swiss_vault.done=true;state.questsCompleted++;state.cycles+=80;updateHUD();
    spawnBurst(state.player.x+16,state.player.y+16);
    showSideDialogue(npcs.find(n=>n.id==='vault_hint'),'dialoguesDone');
    if(state.questsCompleted>=state.totalQuests)setTimeout(showCompletion,500);
  }
}

function updateCamera(){
  const tx=state.player.x-canvas.width/2+16,ty=state.player.y-canvas.height/2+16;
  state.camera.x+=(tx-state.camera.x)*0.1;state.camera.y+=(ty-state.camera.y)*0.1;
  state.camera.x=Math.max(0,Math.min(COLS*TILE-canvas.width,state.camera.x));
  state.camera.y=Math.max(0,Math.min(ROWS*TILE-canvas.height,state.camera.y));
}

function checkNPCInteraction(){
  for(const npc of npcs){
    const dist=Math.hypot((state.player.x+16)-(npc.x+16),(state.player.y+16)-(npc.y+16));
    if(dist<44){
      const q=state.quests[npc.quest];
      if(npc.isSideQuest){
        if(q.done){showSideDialogue(npc,'dialoguesDone');return true;}
        switch(npc.isSideQuest){
          case'canister_assembly':
            if(state.fragments.collected>=4){state.currentNPC=npc;state.dialogueQueue=npc.dialoguesReady;state.dialogueIndex=0;state.screen='dialogue';state._afterDialogue='assembly';showDialogue();}
            else{state.currentNPC=npc;state.dialogueQueue=npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';showDialogue();}return true;
          case'ddos_defense':state.currentNPC=npc;state.dialogueQueue=npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';state._afterDialogue='ddos';showDialogue();return true;
          case'cycle_burn':state.currentNPC=npc;state.dialogueQueue=npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';state._afterDialogue='burn';showDialogue();return true;
          case'swiss_vault':state.currentNPC=npc;state.dialogueQueue=q.done?npc.dialoguesDone:npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';showDialogue();return true;
        }
      }
      state.currentNPC=npc;state.dialogueQueue=npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';showDialogue();return true;
    }
  }return false;
}

function showSideDialogue(npc,key){state.currentNPC=npc;state.dialogueQueue=npc[key]||npc.dialogues;state.dialogueIndex=0;state.screen='dialogue';showDialogue();}
function showDialogue(){
  const box=document.getElementById('dialogue-box'),d=state.dialogueQueue[state.dialogueIndex];
  if(!d){closeDialogue();return;}box.style.display='block';
  box.querySelector('.speaker').textContent=d.speaker==='QUEST'?'★ QUEST':d.speaker;
  box.querySelector('.text').textContent=d.text;
  box.querySelector('.prompt').textContent=state.dialogueIndex<state.dialogueQueue.length-1?'▼ SPACE to continue':'▼ SPACE to close';
}
function advanceDialogue(){
  state.dialogueIndex++;
  if(state.dialogueIndex>=state.dialogueQueue.length){
    const after=state._afterDialogue;state._afterDialogue=null;
    if(state.currentNPC&&!state.currentNPC.isSideQuest&&!state.quests[state.currentNPC.quest].done){
      state.quests[state.currentNPC.quest].done=true;state.questsCompleted++;state.cycles+=50;updateHUD();
      spawnBurst(state.currentNPC.x+16,state.currentNPC.y+16);
      if(state.questsCompleted>=state.totalQuests)setTimeout(showCompletion,500);
    }
    closeDialogue();
    if(after==='assembly')setTimeout(initAssembly,200);
    else if(after==='ddos')setTimeout(initDDoS,200);
    else if(after==='burn')setTimeout(initBurn,200);
    return;
  }showDialogue();
}
function closeDialogue(){document.getElementById('dialogue-box').style.display='none';state.screen='playing';state.currentNPC=null;}

function showCompletion(){
  state.screen='completion';document.getElementById('completion-screen').style.display='flex';
  const m=['internet_computer','caffeine','self_writing','cloud_engines','mission70'].filter(k=>state.quests[k].done).length;
  const s=['canister_assembly','swiss_vault','cycle_burn','ddos_defense'].filter(k=>state.quests[k].done).length;
  document.getElementById('completion-text').textContent="You've explored the entire Internet Computer ecosystem — from sovereign cloud infrastructure to self-writing applications, from the physical Cloud Engines to the tokenomics of Mission 70. The future of computing isn't owned by corporations. It's owned by its users.";
  document.getElementById('completion-stats').textContent=`Main quests: ${m}/5 | Side quests: ${s}/4 | Cycles: ${state.cycles} | Rating: ${'★'.repeat(Math.min(5,Math.floor((m+s)/2)))}`;
}

function updateQuestLog(){
  const log=document.getElementById('quest-log');
  if(state.keys.Tab||state.keys.q||state.keys.Q){
    log.style.display='block';
    let h='<h3>QUEST LOG</h3><div class="section">MAIN QUESTS</div>';
    ['internet_computer','caffeine','self_writing','cloud_engines','mission70'].forEach(id=>{const q=state.quests[id];h+=`<div class="quest ${q.done?'done':''}">${q.done?'✓':'○'} ${q.name}</div>`;});
    h+='<div class="section">SIDE QUESTS</div>';
    ['canister_assembly','swiss_vault','cycle_burn','ddos_defense'].forEach(id=>{const q=state.quests[id];h+=`<div class="quest ${q.done?'done':''}">${q.done?'✓':'○'} ${q.name}</div>`;});
    log.innerHTML=h;
  }else log.style.display='none';
}

function updateHUD(){
  document.getElementById('quest-count').textContent=`Quests: ${state.questsCompleted}/${state.totalQuests}`;
  document.getElementById('cycles').textContent=`Cycles: ${state.cycles}`;
  const fh=document.getElementById('fragments-hud');
  if(state.fragments.collected>0&&!state.quests.canister_assembly.done){fh.style.display='block';fh.textContent=`Fragments: ${state.fragments.collected}/4`;}else fh.style.display='none';
}

function spawnBurst(x,y){for(let i=0;i<20;i++)state.particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:1,size:4,color:[C.cyan,C.lime,C.purple][Math.floor(Math.random()*3)]});}

// MAIN RENDER
// ============================================================
function render(){
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  const sc=Math.max(0,Math.floor(state.camera.x/TILE)),sr=Math.max(0,Math.floor(state.camera.y/TILE));
  const ec=Math.min(COLS,sc+VIEW_COLS+2),er=Math.min(ROWS,sr+VIEW_ROWS+2);
  for(let y=sr;y<er;y++)for(let x=sc;x<ec;x++){
    const sx=x*TILE-state.camera.x,sy=y*TILE-state.camera.y,t=world[y][x],zone=getZoneAt(x,y);
    switch(t){
      case 1:drawKeyTile(sx,sy,x,y,false);break;case 2:drawPath(sx,sy);break;case 3:drawWall(sx,sy);break;
      case 4:drawWater(sx,sy);break;case 5:drawKeyTile(sx,sy,x,y,true,zone?.color);break;
      case 6:drawZoneBorder(sx,sy,zone?.color);break;
      case 14:drawFakeWall(sx,sy);break;case 15:drawFakeWallClue(sx,sy);break;
      case 8:case 9:case 10:case 11:drawRoomFloor(sx,sy,t);break;case 12:drawVaultCore(sx,sy);break;
    }
  }
  pickups.forEach(p=>{if(p.collected)return;const sx=p.x-state.camera.x,sy=p.y-state.camera.y;if(sx>-20&&sx<canvas.width+20&&sy>-20&&sy<canvas.height+20)drawPickup(p,sx,sy);});
  codeFragments.forEach(f=>{if(f.collected)return;const sx=f.x-state.camera.x,sy=f.y-state.camera.y;if(sx>-40&&sx<canvas.width+40&&sy>-40&&sy<canvas.height+40)drawCodeFragment(f,sx,sy);});
  npcs.forEach(n=>{const sx=n.x-state.camera.x,sy=n.y-state.camera.y;if(sx>-40&&sx<canvas.width+40&&sy>-40&&sy<canvas.height+40)drawNPC(n,sx,sy);});
  drawPlayer(state.player.x-state.camera.x,state.player.y-state.camera.y);
  if(state.screen==='playing')npcs.forEach(n=>{const d=Math.hypot((state.player.x+16)-(n.x+16),(state.player.y+16)-(n.y+16));if(d<50){const sx=n.x-state.camera.x,sy=n.y-state.camera.y;ctx.fillStyle='rgba(14,3,31,0.85)';ctx.fillRect(sx-10,sy+34,52,16);ctx.fillStyle=C.lime;ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('[SPACE]',sx+16,sy+46);}});
  drawParticles();drawFloatingTexts();drawZoneLabel();
  if(state.questsCompleted===0&&state.screen==='playing'){ctx.fillStyle='rgba(14,3,31,0.7)';ctx.fillRect(canvas.width/2-170,canvas.height-35,340,25);ctx.fillStyle='#8a7aa0';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('WASD/Arrows move | TAB quest log | SPACE interact',canvas.width/2,canvas.height-19);}
  drawMinimap();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;state.time=ts/1000;
  if(state.screen==='playing'){updatePlayer();updateCamera();updateQuestLog();}
  else if(state.screen==='minigame_ddos'){updateDDoS(dt);renderDDoS();}
  else if(state.screen==='minigame_burn')renderBurn();
  else if(state.screen==='minigame_assembly')renderAssembly();
  if(!['title','minigame_ddos','minigame_burn','minigame_assembly'].includes(state.screen))render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown',e=>{
  state.keys[e.key]=true;
  if(state.screen==='title'&&(e.key===' '||e.key==='Enter')){e.preventDefault();state.screen='playing';document.getElementById('title-screen').style.display='none';state.player.x=40*TILE;state.player.y=32*TILE;state.camera.x=state.player.x-canvas.width/2;state.camera.y=state.player.y-canvas.height/2;return;}
  if(state.screen==='dialogue'&&(e.key===' '||e.key==='Enter')){e.preventDefault();advanceDialogue();return;}
  if(state.screen==='playing'&&(e.key===' '||e.key==='Enter')){e.preventDefault();checkNPCInteraction();}
  if(state.screen==='completion'&&(e.key===' '||e.key==='Enter')){e.preventDefault();state.screen='playing';document.getElementById('completion-screen').style.display='none';}
  if(state.screen==='minigame_ddos'){if(e.key==='1')blockLane(0);if(e.key==='2')blockLane(1);if(e.key==='3')blockLane(2);if(e.key==='4')blockLane(3);if(e.key==='Escape')finishDDoS();e.preventDefault();}
  if(state.screen==='minigame_burn'){const step=e.shiftKey?10:5;if(e.key==='ArrowUp')state.burnCursor=Math.max(0,state.burnCursor-1);if(e.key==='ArrowDown')state.burnCursor=Math.min(4,state.burnCursor+1);if(e.key==='ArrowRight'){const c=state.burnCanisters[state.burnCursor];state.burnAllocated[state.burnCursor]=Math.min(c.cost,state.burnAllocated[state.burnCursor]+step);}if(e.key==='ArrowLeft')state.burnAllocated[state.burnCursor]=Math.max(0,state.burnAllocated[state.burnCursor]-step);if(e.key==='Enter')submitBurn();if(e.key==='Escape'){mgCanvas.style.display='none';state.screen='playing';}e.preventDefault();}
  if(state.screen==='minigame_assembly'){const avail=[0,1,2,3].filter(i=>!state.assemblyOrder.includes(i));if(e.key==='ArrowLeft')state.assemblyCursor=Math.max(0,state.assemblyCursor-1);if(e.key==='ArrowRight')state.assemblyCursor=Math.min(avail.length-1,state.assemblyCursor+1);if(e.key===' '&&avail.length){state.assemblyOrder.push(avail[state.assemblyCursor%avail.length]);state.assemblyCursor=0;}if(e.key==='Backspace'&&state.assemblyOrder.length)state.assemblyOrder.pop();if(e.key==='Enter'&&state.assemblyOrder.length===4)submitAssembly();if(e.key==='Escape'){mgCanvas.style.display='none';state.screen='playing';}e.preventDefault();}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Tab'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{state.keys[e.key]=false;});

requestAnimationFrame(gameLoop);
</script>
